<div class="product-order-container">
	<div class="product-image">
		<img src="tabs/Laser_cutting/box1x2.PNG" alt="Product Image" />
	</div>
	<form class="order-form">
		<div class="form-group">
			<label for="quantity">Quantity</label>
			<input id="quantity" type="number" min="1" value="1" />
		</div>
		<div class="form-group">
			<label for="unitLength">Unit Length</label>
			<input id="unitLength" type="number" min="1" value="1" />
		</div>
		<div class="form-group">
			<label for="unitsX">Units X Dimension</label>
			<input id="unitsX" type="number" min="1" value="1" />
		</div>
		<div class="form-group">
			<label for="unitsY">Units Y Dimension</label>
			<input id="unitsY" type="number" min="1" value="1" />
		</div>
		<div class="form-group">
			<label for="height">Height</label>
			<input id="height" type="number" min="1" value="1" />
		</div>
		<div class="form-group checkbox-group">
			<input id="stackable" type="checkbox" />
			<label for="stackable">Stackable</label>
		</div>
		<button type="submit" class="order-btn">Order</button>
	</form>
</div>
