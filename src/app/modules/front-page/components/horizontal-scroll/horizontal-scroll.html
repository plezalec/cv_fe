<div #scrollContainer class="gallery-scroll">
  <div class="gallery-track">
    <img *ngFor="let img of loopedImages"
         [src]="'/horizontal-scroll/' + img"
         (click)="onImageClick(img)"
         class="gallery-img" />
  </div>
</div>

<div *ngIf="enlargedImage" class="enlarge-overlay" (click)="onOverlayClick($event)">
  <img [src]="'/horizontal-scroll/' + enlargedImage" class="enlarged-img" />
</div>
