
<div class="chat-input-container">
    <textarea matInput #autoResize (input)="autoResizeTextarea(autoResize)" placeholder="Ex. It makes me feel..." class="chat-input"></textarea>
    <button matButton="filled" class="send-button">Send</button>
    <button matIconButton aria-label="More options" class="more-options-button">
        <mat-icon>more_vert</mat-icon>
    </button>
</div>
