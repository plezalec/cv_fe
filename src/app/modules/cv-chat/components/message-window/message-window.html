
<div class="parent-container">
<div #messageWindowContainer (scroll)="onScroll()" class="message-window-container">
    @for (msg of messages; track msg) {
        <div class="message {{msg.type}}">
            <div [innerHTML]="msg.safeContent()"></div>
        </div>
    }
</div>

<app-agent-avatar #agentAvatar [conversationType]="conversationType" class="floating-avatar"></app-agent-avatar>
</div>
