
<div class="chat-container">
<app-message-window 
#messageWindow [conversation]="conversation" 
[conversationType]="conversationType"
></app-message-window>
<app-chat-input 
(messageSend)="onMessageSend($event)" 
(newConversation)="setNewConversation()" 
[conversationType]="conversationType"
></app-chat-input>
</div>
